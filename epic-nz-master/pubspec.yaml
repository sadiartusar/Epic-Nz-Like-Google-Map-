name: epic_nz
description: "A new Flutter project."

publish_to: 'none'


version: 1.1.0+3

environment:
  sdk: ^3.10.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  image_picker: ^1.2.1
  shared_preferences: ^2.5.4
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  http: ^1.6.0
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  flutter_web_auth_2: ^5.0.1
  speech_to_text: ^7.3.0
  url_launcher: ^6.3.2
  geocoding: ^4.0.0
  flutter_rating_bar: ^4.0.1
  marquee: ^2.3.0
  mapbox_maps_flutter: ^2.3.0
  intl: ^0.20.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.0.0
  socket_io_client: ^3.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_stripe: ^12.2.0
  flutter_local_notifications: ^20.1.0
  share_plus: ^7.2.1
  firebase_dynamic_links: ^6.1.9
  app_links: ^3.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon.png"


flutter:


  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
    - assets/payments/
    - assets/background/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700


